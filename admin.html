<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>JJ // studio — content + leads</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='black'/><text x='2' y='12' font-family='monospace' font-size='10' fill='white'>JJ</text></svg>">
<style>
@font-face {
  font-family: "Departure Mono";
  src: url("fonts/DepartureMono-Regular.woff2") format("woff2");
  font-display: swap;
}
:root { --bg:#000; --fg:#fff; --dim:#888; --line:#333;
  --mono:"Departure Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--fg); font-family:var(--mono); font-size:14px; line-height:1.6; padding:24px 18px 80px; }
a { color:var(--fg); }
.wrap { max-width:1040px; margin:0 auto; }
header { display:flex; flex-wrap:wrap; align-items:baseline; gap:12px 20px; border-bottom:1px solid var(--fg); padding-bottom:14px; margin-bottom:6px; }
h1 { font-size:16px; letter-spacing:.12em; }
.muted { color:var(--dim); font-size:12px; }
.spacer { flex:1; }
button, select, input, textarea { font-family:inherit; font-size:13px; color:var(--fg); background:var(--bg); border:1px solid var(--fg); }
button { padding:5px 12px; cursor:pointer; }
button:hover { background:var(--fg); color:var(--bg); }
button.ghost { border-color:var(--line); color:var(--dim); }
button.ghost:hover { background:var(--fg); color:var(--bg); border-color:var(--fg); }
.note { color:var(--dim); font-size:11px; margin:8px 0 20px; }
nav.tabs { display:flex; gap:8px; margin:18px 0 22px; }
nav.tabs button { letter-spacing:.08em; }
nav.tabs button.on { background:var(--fg); color:var(--bg); }
.col-head { color:var(--dim); letter-spacing:.1em; font-size:12px; margin:22px 0 10px; border-bottom:1px solid var(--line); padding-bottom:6px; }
.card { border:1px solid var(--line); padding:12px 14px; margin-bottom:10px; }
.card .top { display:flex; flex-wrap:wrap; align-items:center; gap:8px 12px; }
.card .title { font-weight:700; }
.tag { font-size:11px; color:var(--dim); border:1px solid var(--line); padding:0 7px; }
.tag.fr { color:var(--fg); }
.row-actions { display:flex; gap:6px; flex-wrap:wrap; }
.row-actions .spacer { flex:1; min-width:20px; }
.editor { margin-top:12px; border-top:1px solid var(--line); padding-top:12px; display:grid; gap:8px; }
.editor label { font-size:11px; color:var(--dim); display:block; margin-bottom:2px; }
.editor input, .editor select, .editor textarea { width:100%; padding:7px 9px; }
.editor textarea { min-height:160px; resize:vertical; white-space:pre-wrap; }
.editor .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.langwrap { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
table { width:100%; border-collapse:collapse; }
th, td { text-align:left; padding:8px 8px; border-bottom:1px solid var(--line); vertical-align:top; font-size:13px; }
th { color:var(--dim); font-size:11px; letter-spacing:.06em; }
td input, td select, td textarea { width:100%; border-color:transparent; background:transparent; padding:4px; }
td input:focus, td select:focus, td textarea:focus { border-color:var(--line); outline:none; }
td textarea { min-height:30px; resize:vertical; }
.pill { font-size:11px; padding:1px 8px; border:1px solid var(--fg); }
.flash { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--fg); color:var(--bg); padding:8px 16px; font-size:12px; opacity:0; transition:opacity .2s; pointer-events:none; }
.flash.show { opacity:1; }
.count { color:var(--dim); font-size:11px; }
@media (max-width:680px){ .editor .grid2, .langwrap { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>JJ // studio</h1>
    <span class="muted" id="weekline"></span>
    <span class="spacer"></span>
    <button class="ghost" onclick="exportJSON()">export ↓</button>
    <button class="ghost" onclick="document.getElementById('imp').click()">import ↑</button>
    <input type="file" id="imp" accept="application/json" hidden onchange="importJSON(event)">
  </header>
  <p class="note">⛁ tout est stocké <b>uniquement dans ce navigateur</b> (localStorage) — rien n'est envoyé sur le serveur. Pense à <b>export ↓</b> de temps en temps. Page non indexée, non liée depuis le site public.</p>

  <nav class="tabs">
    <button data-tab="posts" class="on" onclick="setTab('posts')">POSTS</button>
    <button data-tab="veille" onclick="setTab('veille')">VEILLE</button>
    <button data-tab="leads" onclick="setTab('leads')">LEADS</button>
  </nav>

  <section id="tab-posts"></section>
  <section id="tab-veille" hidden></section>
  <section id="tab-leads" hidden></section>
</div>
<div class="flash" id="flash"></div>

<script>
"use strict";
const $ = (s, r=document) => r.querySelector(s);
const uid = () => "id" + Math.abs(Date.now() + Math.floor(performance.now()*1000)).toString(36) + Math.floor(performance.now()).toString(36);
const esc = (s) => { const d=document.createElement("div"); d.textContent = s==null?"":s; return d.innerHTML; };
const KEY = "jj-studio-v1";
const STATUSES = ["idea","draft","ready","posted"];
const STATUS_LABEL = { idea:"💡 IDEAS", draft:"✍️ DRAFTING", ready:"✅ READY TO POST", posted:"📮 POSTED" };

let state = load();

function seed() {
  const P1_FR = `Cette semaine, j'ai designé une IA. Pour des avocats. 🫠

Apprentissage n°1 : un avocat ne fait pas confiance à une IA. Et franchement, il a 100% raison.

Le problème qu'on attaque chez North : sortir les pages de signature de 50 à 80 documents de closing, les trier par signataire, livrer un paquet propre par personne. Aujourd'hui = 5 heures de découpage manuel par dossier. Fait par un humain qui, vers la page 73, commence doucement à se demander pourquoi il a fait du droit.

Le piège : tu ne peux PAS balancer 100 lignes d'output IA à un avocat en disant "fais-moi confiance". Il ne lira pas. Ou pire — il lira, trouvera UNE erreur, et ne reviendra jamais.

Donc la vraie question de design n'était pas "comment l'IA classe les pages".
C'était : "comment je la rends auditable sans noyer l'avocat".

Notre réponse : on trie par niveau de confiance, pas par ordre du document. Là où l'IA hésite → ça remonte tout en haut. Là où elle est sûre → ça se replie. L'avocat passe 2 minutes là où ça compte au lieu de 5 heures partout.

L'IA ne remplace pas l'avocat. Elle lui rend ses 5 heures.

Je construis North OS avec Ilan & Christophe : du Service-as-Software pour un secteur juridique à 385 Mds$. Premier d'une série où je raconte ce que ça fait, vraiment, de designer des produits IA que des pros méfiants acceptent d'utiliser.

(Spoiler : c'est 10% de modèle, 90% de confiance.)`;

  const P1_EN = `This week I designed an AI. For lawyers. 🫠

Lesson #1: a lawyer does not trust AI. And honestly, he's 100% right.

The problem we're attacking at North: pull the signature pages out of 50–80 closing documents, sort them by signing party, deliver one clean packet per person. Today = 5 hours of manual cut-and-sort per deal. Done by a human who, somewhere around page 73, quietly starts questioning his career choices.

The trap: you can NOT dump 100 rows of AI output on a lawyer and say "trust me." He won't read it. Or worse — he'll read it, find ONE error, and never come back.

So the real design question wasn't "how does the AI classify pages."
It was: "how do I make it auditable without drowning the lawyer."

Our answer: sort by confidence, not by document order. Where the AI hesitates → it floats to the top. Where it's sure → it collapses. The lawyer spends 2 minutes where it matters instead of 5 hours everywhere.

AI doesn't replace the lawyer. It gives him back his 5 hours.

I'm building North OS with Ilan & Christophe: Service-as-Software for a $385B legal industry. First in a series on what it actually feels like to design AI products that skeptical pros agree to use.

(Spoiler: it's 10% model, 90% trust.)`;

  const P2_FR = `Hot take : "designer qui code" ne devrait pas être une licorne en 2026.

J'ai 17 ans de design produit. J'ai aussi ~15 repos sur mon GitHub que je design ET que je code, le soir, pour de vrai.

Pourquoi ? Parce que je suis fatigué du ping-pong :
designer → "voici ma maquette parfaite" → dev → "ouais, infaisable" → designer → 😤

Quand tu designes ET tu builds :
— tu arrêtes de dessiner des trucs infaisables
— tu sens la friction technique AVANT de la refiler à quelqu'un
— ton "MVP" sort en un week-end, pas en un trimestre
— tu apprends plus en shippant un side-project bancal qu'en peaufinant une 12e variante d'écran qui ne verra jamais le monde

OpenMat (mon app pour grapplers), CoachingSimple, des outils internes, North… aucun n'est sorti d'un hand-off. Ils sont sortis d'un 'git push'.

Le futur du design produit, ce n'est pas "designer vs ingénieur".
C'est des gens qui ont du goût ET qui savent l'expédier.

(Et oui, mon CSS est parfois un crime. On en reparle quand le truc est en prod.)`;

  const P2_EN = `Hot take: "designer who codes" should not be a unicorn in 2026.

I have 17 years of product design. I also have ~15 repos on my GitHub that I design AND code, at night, for real.

Why? Because I'm tired of the ping-pong:
designer → "here's my perfect mockup" → dev → "yeah, can't build that" → designer → 😤

When you design AND build:
— you stop drawing things that can't be built
— you feel the technical friction BEFORE you hand it off
— your "MVP" ships in a weekend, not a quarter
— you learn more from shipping one janky side-project than from polishing a 12th screen variant that never meets the real world

OpenMat (my app for grapplers), CoachingSimple, internal tools, North… none of them came from a hand-off. They came from a 'git push'.

The future of product design isn't "designer vs engineer."
It's people who have taste AND know how to ship it.

(And yes, my CSS is occasionally a crime. We'll discuss it once the thing is in prod.)`;

  const P3_FR = `Tout le monde répète que "le designer devient un curateur de l'IA" en 2026.

73% des designers le disent. Gartner annonce 40% des apps d'entreprise avec des agents IA d'ici fin 2026. La "Generative UI" est LE buzzword de l'année : l'IA compose l'écran à la volée selon l'intention de l'utilisateur.

Cool. Mais voilà ce que personne ne dit tout haut :

Si l'IA génère 100 écrans en 10 secondes, le travail rare n'est plus de produire l'écran.
C'est de savoir lequel est le bon. Et surtout : lequel ne PAS expédier.

L'IA a rendu le "faire" gratuit. Elle a rendu le goût exponentiellement plus cher.

Le designer de 2026, ce n'est pas un mec qui prompt mieux que toi.
C'est un mec qui sait dire "non, pas ça" 100 fois par jour — avec une raison à chaque fois.

La GenUI ne tue pas le design. Elle tue le design médiocre, celui qui n'était que de la production. Le jugement, lui, vient de prendre 10 ans de valeur.

(Donc si ton seul skill c'était de pousser des pixels proprement… c'est peut-être le moment d'apprendre à juger.)`;

  const P3_EN = `Everyone keeps saying "designers are becoming AI curators" in 2026.

73% of designers say so. Gartner says 40% of enterprise apps will ship AI agents by end of 2026. "Generative UI" is THE buzzword of the year: AI composing the screen on the fly from user intent.

Cool. But here's what nobody says out loud:

If AI generates 100 screens in 10 seconds, the rare work is no longer producing the screen.
It's knowing which one is right. And especially: which one NOT to ship.

AI made "making" free. It made taste exponentially more expensive.

The 2026 designer isn't someone who prompts better than you.
It's someone who can say "no, not that" 100 times a day — with a reason each time.

GenUI doesn't kill design. It kills mediocre design, the kind that was just production. Judgment just gained 10 years of value.

(So if your only skill was pushing clean pixels… might be time to learn how to judge.)`;

  return {
    posts: [
      { id:uid(), title:"⏳ North — designing AI lawyers will trust (EMBARGO: summer launch)", topic:"North OS", lang:"both", fr:P1_FR, en:P1_EN, status:"draft", date:"" },
      { id:uid(), title:"Designer who ships (taste + execution)", topic:"maker / side-projects", lang:"both", fr:P2_FR, en:P2_EN, status:"draft", date:"" },
      { id:uid(), title:"GenUI: AI made making free, taste expensive", topic:"AI × design — hot take", lang:"both", fr:P3_FR, en:P3_EN, status:"draft", date:"" },
    ],
    ideas: [
      { id:uid(), topic:"YC: \"build the AI law firm, not the software\"", link:"https://www.ycombinator.com/companies/industry/legal",
        angle:"YC pousse les fondateurs à monter des cabinets IA et à sortir du billable-hour. North OS = littéralement ça (Service-as-Software / AI MSO). Angle : \"pendant que tout le monde vend un copilot aux avocats, on construit la boîte qui fait le travail.\" Toi qui es DANS ce mouvement, pas qui le commente." },
      { id:uid(), topic:"Legal AI : marché ×3,5 d'ici 2030, Harvey lève gros", link:"https://brightflag.com/resources/top-legal-ai-companies/",
        angle:"Marché legal AI : 3,1 Mds$ (2024) → 10,8 Mds$ (2030), +28%/an. Harvey, Supio, Caseflood lèvent. Angle contrarian : \"copilot vs service-as-software\" — la plupart ajoutent un chat à côté du boulot ; le vrai gain c'est de supprimer le boulot. Ce que North fait sur les signature packets." },
      { id:uid(), topic:"Gartner : 40% des apps avec agents IA fin 2026", link:"https://www.uxpin.com/studio/blog/ui-ux-design-trends/",
        angle:"Agents partout — mais qui design la couche de CONFIANCE ? Un agent qui agit sans être auditable, personne de sérieux ne l'adopte. Relier au pattern North (review confidence-first, page de provenance). Le vrai skill 2026 : designer l'auditabilité." },
      { id:uid(), topic:"La 'corrections ledger' : chaque correction = future data", link:"",
        angle:"Insight tiré de North : v0 capture chaque correction de l'avocat en JSON (down-payment de training data pour v1). Angle produit : comment tu designes la boucle de feedback dès le v0, sans la vendre comme du fine-tuning. 'Ship l'humble version, capture le signal.'" },
    ],
    leads: [],
  };
}

function load() {
  try { const raw = localStorage.getItem(KEY); if (raw) return JSON.parse(raw); } catch(e){}
  return seed();
}
function save() { localStorage.setItem(KEY, JSON.stringify(state)); render(); }
function flash(msg){ const f=$("#flash"); f.textContent=msg; f.classList.add("show"); clearTimeout(f._t); f._t=setTimeout(()=>f.classList.remove("show"),1400); }

/* ── tabs ─────────────────────────────────────────────── */
function setTab(t){
  ["posts","veille","leads"].forEach(x=>{ $("#tab-"+x).hidden = x!==t; });
  document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.toggle("on", b.dataset.tab===t));
}

/* ── POSTS ────────────────────────────────────────────── */
let editing = null;
function render(){
  // week line
  const ready = state.posts.filter(p=>p.status==="ready").length;
  const posted = state.posts.filter(p=>p.status==="posted").length;
  $("#weekline").textContent = `${ready} prêt(s) · ${posted} posté(s) · cible : 1 post / semaine`;

  // posts grouped by status
  let html = `<div style="margin-bottom:14px"><button onclick="newPost()">+ new post</button></div>`;
  for (const st of STATUSES){
    const items = state.posts.filter(p=>p.status===st);
    html += `<div class="col-head">${STATUS_LABEL[st]} <span class="count">(${items.length})</span></div>`;
    if (!items.length) html += `<p class="muted" style="margin-bottom:10px">—</p>`;
    for (const p of items) html += postCard(p);
  }
  $("#tab-posts").innerHTML = html;

  // veille
  let vh = `<div style="margin-bottom:14px"><button onclick="newIdea()">+ new idea</button></div>`;
  if (!state.ideas.length) vh += `<p class="muted">— rien pour l'instant</p>`;
  for (const it of state.ideas) vh += ideaCard(it);
  $("#tab-veille").innerHTML = vh;

  // leads
  renderLeads();
}

function postCard(p){
  const isEd = editing === p.id;
  const langTag = p.lang==="both" ? `<span class="tag fr">FR</span><span class="tag">EN</span>` :
                  p.lang==="fr" ? `<span class="tag fr">FR</span>` : `<span class="tag">EN</span>`;
  let h = `<div class="card">
    <div class="top">
      <span class="title">${esc(p.title)||"<i>(sans titre)</i>"}</span>
      ${p.topic?`<span class="tag">${esc(p.topic)}</span>`:""}
      ${langTag}
      ${p.date?`<span class="muted">📅 ${esc(p.date)}</span>`:""}
      <span class="spacer"></span>
      <div class="row-actions">
        ${p.fr?`<button class="ghost" onclick="copyText(${q(p.id)},'fr')">copy FR</button>`:""}
        ${p.en?`<button class="ghost" onclick="copyText(${q(p.id)},'en')">copy EN</button>`:""}
        <button class="ghost" onclick="toggleEdit(${q(p.id)})">${isEd?"close":"edit"}</button>
      </div>
    </div>`;
  if (isEd) h += postEditor(p);
  h += `</div>`;
  return h;
}

function postEditor(p){
  return `<div class="editor">
    <div class="grid2">
      <div><label>title</label><input value="${esc(p.title)}" oninput="upd(${q(p.id)},'title',this.value)"></div>
      <div><label>topic / source</label><input value="${esc(p.topic)}" oninput="upd(${q(p.id)},'topic',this.value)"></div>
    </div>
    <div class="grid2">
      <div><label>status</label><select onchange="upd(${q(p.id)},'status',this.value)">
        ${STATUSES.map(s=>`<option value="${s}" ${p.status===s?"selected":""}>${s}</option>`).join("")}
      </select></div>
      <div><label>language</label><select onchange="upd(${q(p.id)},'lang',this.value)">
        ${["both","fr","en"].map(l=>`<option value="${l}" ${p.lang===l?"selected":""}>${l}</option>`).join("")}
      </select></div>
    </div>
    <div><label>target date (YYYY-MM-DD)</label><input value="${esc(p.date)}" placeholder="2026-06-20" oninput="upd(${q(p.id)},'date',this.value)"></div>
    <div class="langwrap">
      <div><label>🇫🇷 FR</label><textarea oninput="upd(${q(p.id)},'fr',this.value)">${esc(p.fr)}</textarea></div>
      <div><label>🇬🇧 EN</label><textarea oninput="upd(${q(p.id)},'en',this.value)">${esc(p.en)}</textarea></div>
    </div>
    <div class="row-actions">
      <button onclick="copyText(${q(p.id)},'fr')">copy FR</button>
      <button onclick="copyText(${q(p.id)},'en')">copy EN</button>
      <span class="spacer"></span>
      <button class="ghost" onclick="delPost(${q(p.id)})">delete</button>
    </div>
  </div>`;
}

function newPost(){
  const p = { id:uid(), title:"", topic:"", lang:"both", fr:"", en:"", status:"draft", date:"", };
  state.posts.unshift(p); editing = p.id; save(); setTab("posts");
}
function toggleEdit(id){ editing = editing===id ? null : id; render(); }
function upd(id, field, val){
  const p = state.posts.find(x=>x.id===id); if(!p) return;
  p[field] = val;
  localStorage.setItem(KEY, JSON.stringify(state));
  if (field==="status" || field==="lang" || field==="title" || field==="topic" || field==="date") render();
}
function delPost(id){
  if(!confirm("Supprimer ce post ?")) return;
  state.posts = state.posts.filter(x=>x.id!==id); editing=null; save();
}
function copyText(id, lang){
  const p = state.posts.find(x=>x.id===id); if(!p) return;
  const txt = lang==="fr" ? p.fr : p.en;
  navigator.clipboard.writeText(txt||"").then(()=>flash(`${lang.toUpperCase()} copié — prêt à coller dans LinkedIn`),
    ()=>flash("copie impossible (clipboard bloqué)"));
}

/* ── VEILLE ───────────────────────────────────────────── */
function ideaCard(it){
  return `<div class="card">
    <div class="top">
      <span class="title">${esc(it.topic)}</span>
      <span class="spacer"></span>
      <div class="row-actions">
        ${it.link?`<a href="${esc(it.link)}" target="_blank" rel="noopener"><button class="ghost">source ↗</button></a>`:""}
        <button onclick="ideaToDraft(${q(it.id)})">→ draft</button>
        <button class="ghost" onclick="delIdea(${q(it.id)})">×</button>
      </div>
    </div>
    <div style="margin-top:8px"><label class="muted">angle</label>
      <textarea style="width:100%; min-height:60px; margin-top:4px; padding:7px 9px" oninput="updIdea(${q(it.id)},'angle',this.value)">${esc(it.angle)}</textarea>
    </div>
  </div>`;
}
function newIdea(){ state.ideas.unshift({id:uid(), topic:"nouveau sujet", angle:"", link:""}); save(); }
function updIdea(id, f, v){ const it=state.ideas.find(x=>x.id===id); if(it){ it[f]=v; localStorage.setItem(KEY, JSON.stringify(state)); } }
function delIdea(id){ state.ideas = state.ideas.filter(x=>x.id!==id); save(); }
function ideaToDraft(id){
  const it = state.ideas.find(x=>x.id===id); if(!it) return;
  const p = { id:uid(), title:it.topic, topic:"veille", lang:"both", fr:(it.angle||""), en:"", status:"draft", date:"" };
  state.posts.unshift(p); editing=p.id; save(); setTab("posts");
  flash("idée → brouillon");
}

/* ── LEADS ────────────────────────────────────────────── */
const LEAD_STATUS = ["new","contacted","talking","won","lost"];
function renderLeads(){
  let h = `<div style="margin-bottom:14px"><button onclick="newLead()">+ new lead</button></div>
    <table><thead><tr>
      <th style="width:15%">name</th><th style="width:15%">company</th><th style="width:14%">source</th>
      <th style="width:12%">status</th><th style="width:14%">link</th><th>notes</th><th style="width:30px"></th>
    </tr></thead><tbody>`;
  if (!state.leads.length) h += `<tr><td colspan="7" class="muted">— aucun lead pour l'instant</td></tr>`;
  for (const l of state.leads){
    h += `<tr>
      <td><input value="${esc(l.name)}" oninput="updLead(${q(l.id)},'name',this.value)"></td>
      <td><input value="${esc(l.company)}" oninput="updLead(${q(l.id)},'company',this.value)"></td>
      <td><input value="${esc(l.source)}" oninput="updLead(${q(l.id)},'source',this.value)"></td>
      <td><select onchange="updLead(${q(l.id)},'status',this.value)">
        ${LEAD_STATUS.map(s=>`<option ${l.status===s?"selected":""}>${s}</option>`).join("")}
      </select></td>
      <td><input value="${esc(l.link)}" placeholder="linkedin.com/…" oninput="updLead(${q(l.id)},'link',this.value)"></td>
      <td><textarea oninput="updLead(${q(l.id)},'notes',this.value)">${esc(l.notes)}</textarea></td>
      <td><button class="ghost" onclick="delLead(${q(l.id)})">×</button></td>
    </tr>`;
  }
  h += `</tbody></table>`;
  $("#tab-leads").innerHTML = h;
}
function newLead(){ state.leads.unshift({id:uid(), name:"", company:"", source:"", status:"new", link:"", notes:""}); save(); }
function updLead(id,f,v){ const l=state.leads.find(x=>x.id===id); if(l){ l[f]=v; localStorage.setItem(KEY, JSON.stringify(state)); if(f==="status") renderLeads(); } }
function delLead(id){ if(!confirm("Supprimer ce lead ?")) return; state.leads = state.leads.filter(x=>x.id!==id); save(); }

/* ── import / export ──────────────────────────────────── */
function exportJSON(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "jj-studio.json"; a.click();
  flash("export téléchargé");
}
function importJSON(ev){
  const file = ev.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = () => { try { const d = JSON.parse(r.result);
    state = { posts:d.posts||[], ideas:d.ideas||[], leads:d.leads||[] }; editing=null; save(); flash("import OK");
  } catch(e){ flash("fichier invalide"); } };
  r.readAsText(file);
}
function q(s){ return JSON.stringify(s); }

render();
const initTab = (location.hash||"").replace("#","");
if (["posts","veille","leads"].includes(initTab)) setTab(initTab);
</script>
